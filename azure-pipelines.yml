trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

stages:

# ---------------- BUILD STAGE ----------------
- stage: Build
  jobs:
  - job: BuildJob
    steps:
    - checkout: self

    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean package'
        jdkVersionOption: '1.17'

    - publish: target
      artifact: drop


# ---------------- TEST STAGE (REGRESSION) ----------------
- stage: Test
  dependsOn: Build
  jobs:
  - job: TestJob
    steps:
    - checkout: self

    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'test'
        options: '-Dmaven.test.failure.ignore=false'
        jdkVersionOption: '1.17'


# ---------------- STAGING DEPLOY ----------------
- stage: Deploy_Staging
  dependsOn: Test
  condition: succeeded()
  jobs:
  - deployment: StagingDeploy
    environment: staging
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - script: |
              echo "Deploying to STAGING"
              ls $(Pipeline.Workspace)/drop


# ---------------- PRODUCTION DEPLOY ----------------
- stage: Deploy_Production
  dependsOn: Deploy_Staging
  condition: succeeded()
  jobs:
  - deployment: ProductionDeploy
    environment: production
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - script: |
              echo "Deploying to PRODUCTION"
              ls $(Pipeline.Workspace)/drop